The best startup advice on the internet. It will teach you to find a co-founder, evaluate ideas, what the best founders are working on now, and how to build a startup.

**Videos to get started:**
- [Where Do Great Startup Ideas Come From?](https://youtu.be/Jcuqq48CNj8?si=j2418K9Geto_01AK)

Practical business and sales, marketing advice.

## Books

### Foundations of Thought
- **The Beginning of Infinity** by David Deutsch - Sam Altman and Naval Ravikant's favourite book
- **Naval's Almanac** by Eric Jorgenson

### AI & the Long-Term Future
- **The Singularity Is Near** by Ray Kurzweil
- **Superintelligence** by Nick Bostrom - Highly recommended by Sam Altman

### Self-Mastery & Influence
- **Atomic Habits** by James Clear
- **Influence: The Psychology of Persuasion** by Robert Cialdini

### High-Agency Lives
- **Elon Musk** by Walter Isaacson
- **Founders Podcast** - The best resource on founder biographies

### Strategic Reality
- **The Art of Strategy** by Avinash Dixit & Barry Nalebuff
- **The Art of War** by Sun Tzu

### Economics
- **The Wealth of Nations** by Adam Smith (foundations only)
- **The New China Playbook** by Keyu Jin
