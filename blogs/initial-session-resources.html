    const markdown = `# Resources for Students + Application Form

Jan 12, 2026

A curated list of resources that I think are important for students to read, watch, and use.

---

## YouTube Channels

### YCombinator

The best startup advice on the internet. It will teach you to find a co-founder, evaluate ideas, what the best founders are working on now, and how to build a startup.

**Videos to get started:**
- [Where Do Great Startup Ideas Come From?](https://youtu.be/Jcuqq48CNj8?si=j2418K9Geto_01AK)
- [Elon Musk and the Midwit Meme](https://youtu.be/IYLVhk7yaaw?si=xW8tlcz4H4TC78HG)

### Alex Hormozi

Practical business and sales advice. No fluff, just actionable content.

**Videos to get started:**
- [If you're ambitious and in your 20s or 30s, please watch this.](https://youtu.be/ub1D6RQocRU?si=Bt3wJbEf0A2_H_BT)
- [My Actual Social Media Strategy For 2026](https://youtu.be/dMZ-n2KSlxE?si=dehADiCqE-a6YPK8)
- [14 Years of Marketing Advice in 35 Minutes](https://youtu.be/JDR-R--4HhM?si=UdjQ68lMDrNSVvr0)

---

## Blogs

- [Situational Awareness : The Decade Ahead](https://situational-awareness.ai)
- [Machines of Loving Grace (By the CEO of Anthropic)](https://www.darioamodei.com/essay/machines-of-loving-grace)
- [What I Wish Someone Had Told Me (By the CEO of ChatGPT and ex-president of Y-Combinator)](https://blog.samaltman.com/what-i-wish-someone-had-told-me) 
- [Researchers and Founders (By the CEO of ChatGPT)](https://blog.samaltman.com/researchers-and-founders)

---

## Books

### Foundations of Thought
- **The Beginning of Infinity** by David Deutsch - Sam Altman and Naval Ravikant's favourite book
- **Naval's Almanac** by Eric Jorgenson

### AI & the Long-Term Future
- **The Singularity Is Near** by Ray Kurzweil
- **Superintelligence** by Nick Bostrom - Highly recommended by Sam Altman

### Self-Mastery & Influence
- **Atomic Habits** by James Clear
- **Influence: The Psychology of Persuasion** by Robert Cialdini

### High-Agency Lives
- **Elon Musk** by Walter Isaacson
- **Founders Podcast** - The best resource on founder biographies

### Strategic Reality
- **The Art of Strategy** by Avinash Dixit & Barry Nalebuff
- **The Art of War** by Sun Tzu

### Economics
- **The Wealth of Nations** by Adam Smith (foundations only)
- **The New China Playbook** by Keyu Jin

---

## Places to Start Building Websites

- [Antigravity](https://antigravity.google)
- [Cursor](https://cursor.com)
- [Claude Code](https://claude.com/code)

---

## Apply

I am accepting a very small number of students for the first cohort. If you're interested, please fill out [this form](https://docs.google.com/forms/d/e/1FAIpQLSfqIH0aReFokO5mhoFrOlc24IWZV4TosoiIsKgh2lopWlw2GQ/viewform?usp=sharing).

You can also [book a call with me](https://calendly.com/akshaygiyer/30min).`;
