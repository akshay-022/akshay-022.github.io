    const markdown = `# The World is Changing. Your Child's Education Isn't.

Jan 1, 2025

Hello,

My name is Akshay Iyer. I am a founder who just turned 24 and have spent the past year in San Francisco deeply immersed in the tech startup ecosystem, observing how effective founders operate.

I was fortunate to receive the best traditional education available: I ranked among the top 0.01% in India's toughest STEM exam (the IIT-JEE), completed three years of AI research at IIT Bombay (India's best tech university), and earned a Master's degree in Computer Science from Columbia University (Ivy League). I've built multiple software products used by thousands of people. I have also built a youtube channel with 20k subscribers and videos with millions of views.

I'm an avid reader across history, philosophy, science, economics, and technology, and I've spent years developing strong mental models for how the world works and how people succeed within it.

I have been seeing the world changing from the center of the city leading that change, and I viscerally feel how short our current education system falls.

I am offering to mentor your child to think and act like the best startup founders in Silicon Valley.

---

## What am I offering?

Traditional education was made to train your kid to be an employee in a world without AI. That world is going to change incredibly quickly. Software engineering has already changed irreversibly - most of the CS skills they would be taught in college have already become unnecessary.

The smartest people I know read broadly and have very high agency. I will teach students to:

1. Build very strong judgment and think independently (the kind they would get from reading broadly)
2. Become high agency (show them how to take control of their own life)
3. Vocally build real-world projects and create an online track record

I will teach them to think and act like the best startup founders in San Francisco.

---

## How will I do this?

- I will mentor them **2 hours per week** in small groups or 1-on-1.
- I will give them access to an **AI tutor** that they use during the week, which will help them consume important content that will help them understand how the world works - this will be content grounded on the most important books and biographies I have read.
- I will mentor them to learn what interests them and use AI to build projects in those domains.

---

## Here is the plan I will follow:

### The 3 month Roadmap

**Week 1: The Foundations of Thought** I will teach them the bedrock of intelligence: First Principles thinking, Rationality, and Philosophy. We will dive into Etymology and Cognitive Biases to understand how language and the mind work. Using concepts from *The Beginning of Infinity*, I will show them how the world actually functions through real-world case studies and mapping exercises.

**Week 2: Strategic Reality** We will cover Game Theory and Economics to close the loop on how global systems and incentives function. This moves them from "student" thinking to "strategic" thinking.

**Week 3: Self-Mastery & Influence** I will teach them how to "learn how to learn" and master their own psychology. We will focus on resilience, habit formation, and the discipline to change their own routines. Finally, I will teach them the art of persuasion—how to communicate ideas so effectively that they can lead and convince others.

**Week 4: Navigating the Future** We will explore where humanity is heading. Using Sci-Fi and concepts like *The Singularity Is Near*, we will discuss Super-intelligence and the massive potential of the coming decades.

**Weeks 5-8: Frontier Technologies** We dive deep into the technologies that will define their lifetime: AI, Quantum Physics, Biotech, and Blockchain. They will understand the mechanics of these "forward-facing" tools rather than just being passive users.

**Week 9: The Real Stories** We will study the biographies of the world's most successful people that demonstrate high agency. We'll look at modern examples of leadership and execution (like Elon Musk) to see how these principles are applied today.

### The Execution: Building & Launching

**Weeks 10-12:** Once the foundation is set, I will sit with them 1-on-1 to brainstorm and decide on a real product they feel drawn to.

I will lead them through the brainstorming process, teach them how to distinguish great ideas from mediocre ones, and help them use AI to build and launch their work into the world.

After the 3 month program ends, you can retain access to my AI tutor at a monthly subscription.

---

## What will they have to show for it?

- **Mastery of Writing:** I will teach them to write with clarity and impact. They will publish blogs to put their ideas out into the world and build an intellectual footprint.
- **A Professional Network:** I will help them establish a presence on Twitter (the global hub for frontier AI). They will document their builds and insights, connecting them directly to the tech community.
- **Real-World Products:** I will guide them through the process of launching a product publicly and acquiring their first real users. They won't just have an idea; they will have a public track record.
- **Visible conversational change:** I can guarantee a visible change in how they speak and think. This is something I have seen in myself and many of my friends who have given themselves a similar self-education.

---

If you're interested in this program for your child, please reach out at [akshaygiyer@gmail.com](mailto:akshaygiyer@gmail.com).`;
