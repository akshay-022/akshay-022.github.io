    const markdown = `# It may be possible for a single startup to disrupt universities

AGI is likely a few thousand days away. The layoffs have begun. Dario says 50% of entry level white collar roles may go away and the junior to senior corporate ladder will get compressed. The leading AI lab CEOs all recommend that kids today "learn to learn" instead of study something in particular. The sentiment is that "New kinds of jobs will soon get created, though we don't know what they will be".

I think it's safe to say that the labour market will get hit hard and soon. At the very least a meaningful part of the population will get displaced and will have to re-skill into these new jobs.

Universities are the best pipeline today into the workforce and they don't feel very well suited to adjust to this - even today, what they teach seems weakly correlated with the work people are actually hired to do. I think the ensuing disruption of the world may be the best wedge to disrupt universities.

Moreover, I think a single startup with an online, self-serve product can own this.

## It's important that we understand the causal chain that gave us universities.

Universities began in medieval Europe, roughly between the 11th and 13th centuries, as guilds of teachers and students. Students gathered around famous masters in cities like Bologna, Paris, and Oxford to study law, theology, medicine, and philosophy.

More people joined because these fields led to power: Church roles, courts, medicine, teaching, and government administration. And for people hiring in these spaces it became a no brainer to use the university degree as a proxy for who to hire.

Universities taught skills that were scarce in the population, and more importantly they became a way to signal who to hire for employers.

And then with time, they became a beautiful social experience. Today many of us owe our friends, partners, even a lot of our identity to our universities and the exposure they gave us.

## How are universities doing at these tasks today?

I studied at IIT Bombay - the hardest university to get into in India. I have many friends at Stanford, Harvard, MIT, Columbia. From my own experiences and my conversations with them I think it's safe to say that universities are not great at teaching you skills - which degree makes you good enough at AI infra to make you a desirable hire as a new grad?

Universities are also limited in their signaling - employers can see that a student is from Stanford and they can see a single number - their grade point average. They do not see what the student is interested in, or how they work well with others, or how much grit they have. And what of the percentage of very competent students from the non-Stanfords of the world.

What else signals? Experiences like the internship at SpaceX you got because of the way your degree signals, or working on research projects with professors in their research labs which you can do only at universities today. This one is genuinely valuable, it's almost an apprenticeship at the cutting edge of domains.

Many Stanford students may not be great employees and many students from other colleges may be great employees. Even in venture capital, Stanford students have capital thrown at them - it's a bad way to allocate capital but it's the best we have - there does not exist any better proxy.

## Why have prior approaches to fixing universities not worked?

1. The motivation problem - After speaking to tens of founders in the education space its painfully apparent that motivation is the biggest problem. I have never once completed a Coursera course, their average completion rate is like 7%.

    Even in universities the drive to study is more driven by fear of a low grade point average and not getting good jobs, than an actual desire to learn.

2. The outcome problem - People study to get into the IITs or Stanford or OpenAI or Jane Street. They do not study to just get better, no education product will have wild PMF that does not make your odds of getting a desirable outcome much better.

## Lucky for us both of these may have the same fix.

Buildspace S5 had 30,000 builders who absolutely loved being part of it. Almost every person I have met who did buildspace has been cracked. There was some self-selection magic there that really seemed to work. It was a simple idea really, build cool things, no one will tell you what to do or make you sit through boring lectures.

And as part of my explorations I have spoken to many, many employers. Now that so many jobs have changed so much, many of them are shifting to proof-of-work. What have you built? Have you shown agency before? How does your twitter look?

So cracked people love building cool things, and employers love people who build cool things.

There is still one missing piece - learning must happen. The kind of learning you get from working in the best robotics lab at CMU, the learning from the PhD students and professors there.

Almost like an apprenticeship.

## How does AI change this?

I think AI can help here, especially if a cracked infra engineer at openAI creates a Claude skill that will knowledge transfer their expertise and the way they work + the things they have seen to an AI.

This does not need to be a digital clone of the openAI infra engineer. It needs to be the process they follow, the rigour of their experiments, the standard they hold themselves to, and the tools they use, maybe some resources which they highly recommend.

Light guidance, not one-sided instruction.

A startup trying to disrupt universities may build AI driven apprenticeships. It may work with domain experts to make AI mentors that can genuinely teach and guide you as you build what idea excites you.

## A possible product?

I can envision the shape of a product that I would want to use.

A student may join one of many apprenticeship options, maybe an AI infra apprenticeship, or an AI context engineering apprenticeship.

The AI and student brainstorm to come up with an idea that the student is excited to build. The AI helps the student scope it so it’s impressive enough. Maybe this could be the student trying to make LLM inference cheaper, or building a small version of something like vLLM from scratch.

As the student builds, the AI shows them resources that are short and useful exactly when they need them. One on how vLLM works, one on how batching works, one on how to not fool yourself with benchmarks.

It also gives feedback to the student on what to do better - maybe they’re spending too much time reading and not enough time building, maybe their benchmark is old, maybe they’re relying on Claude too much and don’t really understand the system yet.

When the student comes up with an idea, the AI tells them the implementation details they’re missing. It helps them design the next experiment, asks them to be more ambitious or more concrete with what they try, and helps them prioritise the most promising ideas.

And then it continues to guide them as they build something they are proud of, just like your professor would at your research lab in university. 

## What of signaling?

This AI mentor sees everything you do, it would know you like a teacher or a co-worker would.

It could generate a report for employers, a report detailing the decisions you made at each moment, the hours you put in, how focused you were on different topics, how above and beyond you went.

Imagine a 19-year-old learning AI infra under a skill built by an ex-OpenAI engineer, building a real inference optimization project, getting introduced to Anthropic and Cursor when they're ready, and doing so in an online community of other cracked kids.

(It is important to note that initially this cannot replace the social part of universities. But if this becomes an important supplement to universities to develop and signal competence I see ways around it - like universities adopting it as a major, or in-person hubs for the best apprentices).

## What's the likelihood of this working?

This has been tried before. Lumiere connects you to PhD students, they mentor you and teach you the right approaches to doing great research and help you get a paper out in time for your college applications. Most recently they were an 8-figure revenue business according to the founder. Even a stripped down, gaming-the-system version of this seems to be doing quite well.

If this works and smart people are drawn to this, this startup will teach, and have the best data on the smartest builders in the world. It can become one of the world's best talent networks.

I believe it could be better than universities at teaching, and better at getting you job outcomes. More importantly it would be completely free for you with the companies paying for access to people like you.

I want to emphasise again that almost every attempt to change education has failed in large part because it cannot promise superior outcomes - a genius AI tutor will likely not have a market unless it gets you better jobs or gets you into Stanford - the pull will simply be too low. Credentialing today being lossy gives me hope in this as a beachhead.

And once companies trust this as a hiring signal, you can layer on whatever AI tutor you think is best in addition to the apprenticeships themselves.

---

Soon our friends and our kids and our friends' kids will enter a world with artificial super intelligence. 

In Silicon Valley, they call it 'The Singularity' because no one knows what happens after.

What I do know is what happens to human development and human work will be one of the biggest levers in deciding this future, and a few VCs saying this is a bad space couldn't mean less to me.

---`;
