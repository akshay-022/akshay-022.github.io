    const markdown = `# **The World is Changing. Your Education Isn't.**

Jan 1, 2026

Hello,

My name is Akshay Iyer. I am a founder who just turned 24 and have spent the past year in San Francisco in the middle of the tech startup ecosystem, observing how effective founders operate.

By background, I ranked among the top 0.01% in India's toughest STEM exam (the IIT-JEE), completed three years of AI research at IIT Bombay (one of India's best tech universities), and earned a Master's degree in Computer Science from Columbia University (Ivy League). I've built multiple software products used by thousands of people and previously ran a YouTube channel with 20k subscribers and millions of views.

Outside of formal education, I'm also an avid reader of biographies, science, economics, and strategy, and it has compounded my thinking in a way no other education has.

I have been seeing how AI is changing the world; and from the center of the city leading that change. I viscerally feel how short our current education system falls. This program is my attempt to give you exposure to the way serious founders actually think, learn, and build.

---

## **What am I offering?**

Traditional education was made to train you to be an employee in a world without AI. That world is going to change incredibly quickly. Software engineering has already changed irreversibly - AI today codes so well that many of the CS skills you would have learnt in college have begun to rapidly diminish in value.

I want to give you the skills and mindset that will help you win in this new world, the founder mindset. I think the best way you will learn is by:

1. **Building something real** and high potential for the world. (An AI/software product)
2. **Building judgment and independent thinking** by learning the best ideas from founders, economics, psychology and strategy - This will be based on the most critically acclaimed books in the space. This is very important to both decide what to build, and to be the one who succeeds at it.

I will teach you to think and act like the best startup founders in San Francisco.

---

### **Who is this for?**

The first cohort of this program is strictly for you if you are:

1. Very motivated and curious.
2. In Grades 9-11.

### **This is NOT for you if:**

You're looking for a "coding class" or "extra tutoring."

You need to be reminded to do your work.

You're looking for a passive learning experience.

You will be expected to read, write, build, and think independently every week. 

---

## **What will you have to show for it?**

**Your Writings:** You will publish blogs to put your ideas out into the world and build an intellectual footprint. I will help you build a presence on twitter, where the tech community has the most presence.

**A Real-World Product:** I will guide you through the process of launching a product publicly and acquiring your first real users. You won't just have an idea; you will have a public track record.

**Visible Change in How You Think:** You will see a visible change in how you speak and think. This is something I have seen in myself and many of my friends who have given themselves a similar self-education. This difference will be evident in your college applications too. It will give your opinions a level of depth that would not be possible otherwise. The smartest Stanford students I know are very evidently well read.

**A Love for Reading:** I may be able to help you prioritise learning and reading more than you do currently. As Naval Ravikant once said in a [talk](https://youtu.be/GAb7Vhv5n-Y?si=ScNDjcKSGHgXK8x2&t=433), reading an hour a day may very well put you in the top 0.001% of people.

---

## **How will I do this?**

I will mentor you **2 hours per week** in small groups or 1-on-1.

I will give you access to an **AI tutor** that you use during the week, which will help you consume important content that will help you understand how the world works - this will be content grounded on the most important books and biographies in the course plan.

I will mentor you to learn what interests you and use AI to **build projects** in those domains.

---

## **Here is the plan I will follow:**

Most of the content I will cover will be based on the books that the most successful founders have repeatedly quoted as changing their lives and approach to work.

**We are not reading these end-to-end. We extract specific mental models and apply them.**

### **The 3 month Roadmap**

### **Week 1: The Foundations of Thought**

We begin by reshaping how you think at the most fundamental level. The focus is first-principles reasoning, rationality, and explanation-based thinking. We examine how great thinkers deconstruct problems, what the right way to evaluate risk is, and where human reasoning systematically fails.

**Core readings :**

- *The Beginning of Infinity* - Sam Altman and Naval Ravikant's favourite book.
- *Elon Musk's first-principles approach* (essays, interviews, case studies)
- *LessWrong Blogs*
- *Naval's Almanac*

This will be the grounding for everything else we will do.

**Deliverable :**

- You will write your first blog - about how your judgement has changed before and after reading these works.
- This will be a practice in writing, and we shall iterate together to make it concise and good.
- This will also ideally help you be much more accurate with your theses about the world.

---

### **Week 2: Artificial Intelligence & the Long-Term Future**

We zoom out to understand where humanity is heading. You will learn how to reason about exponential technologies, long time horizons, and civilisational shifts. The goal is not hype, but sober thinking about AI, intelligence, and the future of work and power.

**Core readings :**

- *The Singularity Is Near* - Will show all the frontiers that will expand over the next 20 years.
- *Superintelligence* - Highly recommended reading by Sam Altman.
- *Iain Banks series on humanity post AGI* - Highly recommended reading by Elon Musk.
- *Machines of Loving Grace* - The blog written by the CEO of Anthropic (Makers of Claude).

These will be the biggest sources of idea generation, and give you the mental models to reason about the future accurately.

**Deliverable :**

- You will come up with 5 ideas on products that could make sense in the world today. A list of industries that are sure to change in the next 20 years.
- A blog on your idea generation process and what you learnt about good and bad ideas. How you came up with these ideas.

---

### **Week 3: Frontier Technologies**

This phase builds conceptual fluency in the technologies that will define your lifetime. We focus on understanding how these technologies work at a high level, what problems they unlock, and why they matter, without turning you into a passive consumer or narrow specialist.

**Core readings :**

- *Curated readings on space tech, robotics, genomics, nanotechnology.*

This will serve to teach the basics of these frontier technologies, their boundaries, and understanding better what they each enable.

**Deliverable :**

- Generate a blog on the state of a field you're most interested in and the breakthroughs waiting to happen with a prediction for the timeframes. This must be based on intense research into the field and additional self-directed reading.
- A spec for the MVP you want to build. We will work together to scope this down dramatically.
- 5 conversations with people in the real world on the feasibility of what you're trying to build.

---

At this point, you will decide one idea that you want to pursue for the rest of the course.

---

### **Week 4: Self-Mastery & Influence**

Before changing the world, you must learn to govern yourself. This week focuses on habit formation, decision-making, persuasion, and social intelligence. You will learn how to deliberately change your own behavior and how to communicate ideas in ways that inspire trust, alignment, and action.

**Core readings :**

- *Atomic Habits* - This book has personally changed my life the most out of any book.
- *Influence: The Psychology of Persuasion* - Important book on sales and how to convince people.
- *Thinking Fast and Slow* - Important mental models on your own biases.

In this week, you will start talking to relevant stakeholders in the space to understand the scope of problems. This is where outreach in the real world will start.

**Deliverable :**

- A blog on a list of habits you want to create for yourself, which we will check in on in the coming weeks.
- Detailed notes from talking to relevant stakeholders in the space to understand the scope of problems. This week will be entirely for customer discovery - I will push you to go much faster and more intensely than you thought possible.

---

### **Week 5: High-Agency Lives**

This week grounds everything in reality. We study individuals who took responsibility, made hard decisions, and executed at scale. The focus is not admiration, but pattern recognition—how high-agency people think, act, and persist under uncertainty. This helps greatly in calibrating what is possible and how hard you can push yourself.

**Core readings :**

- *Elon Musk* by Walter Isaacson - In detail analysis of how Elon operates.
- *Titan* by Ron Chernow - Incredible book to learn about strategy and dealmaking.
- *Founders Podcast* - The best resource I have seen about founder biographies.

Most founders have faced the same bottlenecks you will face. They have come up with high agency, creative ways to break through these bottlenecks.

**Deliverable :**

- A blog of your own choosing on what you learnt from these founders.
- A product proposal.

---

### **Week 6: Strategic Reality**

This week shifts you from abstract intelligence to real-world strategy. We study incentives, power, competition, and cooperation—how individuals, companies, and nations actually behave. You will learn to reason strategically rather than morally or emotionally, and to understand systems instead of surface-level outcomes.

**Core readings :**

- *The Art of Strategy*
- *The Art of War*
- *The Wealth of Nations* (foundations only)
- *The New China Playbook*
- *Good Strategy Bad Strategy*

**Deliverable :**

- A blog on the current state of the world and where you think the biggest companies will be created.
- A barebones version of your MVP.

---

### **The Execution: Building & Launching**

**Weeks 7–12:**

With the intellectual foundation in place, I work 1-on-1 with you to continue helping you build out what you see the world needing. And build something real, and see how the world reacts to it.

If you see the value in reading more, we will continue doing so as in previous weeks.

Once a production ready version is available, we will launch it on twitter. We will get feedback from users, update our hypotheses and iterate together.

I will hold you to a very high standard.

---

I am accepting a very small number of students for the first cohort. If you're interested, please fill out [THIS FORM](https://docs.google.com/forms/d/e/1FAIpQLSfqIH0aReFokO5mhoFrOlc24IWZV4TosoiIsKgh2lopWlw2GQ/viewform?usp=sharing).`;
